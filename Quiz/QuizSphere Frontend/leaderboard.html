<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — QuizSphere</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { padding: 0; }
    .rank-1 { color: #F59E0B; font-weight: 800; }
    .rank-2 { color: #94A3B8; font-weight: 800; }
    .rank-3 { color: #B45309; font-weight: 800; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: .85rem; flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">⚡ QuizSphere</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="categories.html"><span class="nav-icon">📚</span> My Quizzes</a>
        <a href="leaderboard.html" class="active"><span class="nav-icon">🏆</span> Leaderboard</a>
        <a href="results.html"><span class="nav-icon">📊</span> My Results</a>
        <a href="profile.html"><span class="nav-icon">👤</span> Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-btn" onclick="toggleTheme()" style="margin-bottom:.75rem">🌙 Toggle Theme</button>
        <a href="login.html" class="btn btn-secondary btn-sm btn-full" onclick="clearAuth()">🚪 Logout</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">🏆 Leaderboard</h1>
        <p class="page-subtitle">Top performers across all quizzes</p>
      </div>

      <!-- Podium -->
      <div id="podium" class="podium"></div>

      <!-- Full Table -->
      <div class="chart-container">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
          <div style="font-weight:700">All Rankings</div>
          <span class="badge badge-blue" id="totalEntries">Loading...</span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Student</th>
                <th>Quiz ID</th>
                <th>Score</th>
                <th>Total Q's</th>
                <th>Percentage</th>
                <th>Date</th>
                <th>Badge</th>
              </tr>
            </thead>
            <tbody id="lbBody">
              <tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-muted)">
                <div class="spinner spinner-dark" style="margin:0 auto"></div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="api.js"></script>
  <script>
    requireAuth();

    function getBadge(pct) {
      if (pct >= 90) return '<span class="badge badge-purple">🥇 Gold</span>';
      if (pct >= 75) return '<span class="badge badge-blue">🥈 Silver</span>';
      if (pct >= 60) return '<span class="badge badge-yellow">🥉 Bronze</span>';
      return '<span class="badge" style="background:var(--surface2);color:var(--text-muted)">📝 Participant</span>';
    }

    function getInitials(id) {
      return 'U' + id;
    }

    async function loadLeaderboard() {
      try {
        const data = await apiFetch(API.results.leaderboard);
        if (!data || !data.length) {
          document.getElementById('lbBody').innerHTML = `<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-muted)">No results yet. Be the first to take a quiz!</td></tr>`;
          document.getElementById('podium').innerHTML = '';
          document.getElementById('totalEntries').textContent = '0 entries';
          return;
        }

        document.getElementById('totalEntries').textContent = data.length + ' entries';

        // Podium (top 3)
        const top3 = data.slice(0, 3);
        const podiumOrder = top3.length >= 3
          ? [top3[1], top3[0], top3[2]]
          : top3.length === 2 ? [top3[1], top3[0]] : [top3[0]];

        const heightMap = ['podium-2', 'podium-1', 'podium-3'];
        const rankMap = top3.length >= 3
          ? [2, 1, 3]
          : top3.length === 2 ? [2, 1] : [1];

        document.getElementById('podium').innerHTML = `
          <div style="display:flex;align-items:flex-end;justify-content:center;gap:1rem;margin-bottom:2rem">
            ${podiumOrder.map((r, i) => {
              const pct = ((r.score / r.totalQuestions) * 100).toFixed(0);
              return `
                <div style="text-align:center">
                  <div style="font-size:1.8rem;margin-bottom:.5rem">${rankMap[i] === 1 ? '👑' : rankMap[i] === 2 ? '🥈' : '🥉'}</div>
                  <div class="avatar"
style="margin:0 auto .5rem;width:44px;height:44px;font-size:1rem">
${r.userName.charAt(0).toUpperCase()}
</div>
                  <div class="podium-card ${heightMap[i]}">
                    <div class="podium-rank">${rankMap[i]}</div>
                    <div class="podium-name">${r.userName}</div>
                    <div class="podium-score">${pct}%</div>
                  </div>
                </div>`;
            }).join('')}
          </div>`;

        // Table
        document.getElementById('lbBody').innerHTML = data.map((r, i) => {
          const pct = ((r.score / r.totalQuestions) * 100).toFixed(1);
          const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
          return `
            <tr>
              <td><span class="${rankClass}" style="font-size:1.1rem">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1)}</span></td>
              <td>
                <div style="display:flex;align-items:center;gap:.75rem">
                  <div class="avatar">
${r.userName.charAt(0).toUpperCase()}
</div>
                  <span>${r.userName}</span>
                </div>
              </td>
              <td>${r.quizTitle}</td>
              <td><strong>${r.score}</strong></td>
              <td>${r.totalQuestions}</td>
              <td>
                <div style="display:flex;align-items:center;gap:.75rem">
                  <div class="progress-bar" style="width:80px">
                    <div class="progress-fill" style="width:${pct}%"></div>
                  </div>
                  <span style="font-weight:600">${pct}%</span>
                </div>
              </td>
              <td style="color:var(--text-muted);font-size:.82rem">${r.attemptedAt ? new Date(r.attemptedAt).toLocaleDateString() : '—'}</td>
              <td>${getBadge(parseFloat(pct))}</td>
            </tr>`;
        }).join('');

      } catch (err) {
        document.getElementById('lbBody').innerHTML = `<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-muted)">Failed to load leaderboard. Make sure the backend is running.</td></tr>`;
      }
    }

    loadLeaderboard();
  </script>
</body>
</html>
