<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — QuizSphere</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .profile-hero {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border-radius: var(--radius-lg); padding: 3rem 2rem;
      text-align: center; color: #fff; margin-bottom: 2rem; position: relative; overflow: hidden;
    }
    .profile-hero::before {
      content: ''; position: absolute; width: 200px; height: 200px; border-radius: 50%;
      background: rgba(255,255,255,.08); top: -50px; right: -50px;
    }
    .profile-avatar {
      width: 90px; height: 90px; border-radius: 50%;
      background: rgba(255,255,255,.2); border: 3px solid rgba(255,255,255,.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; margin: 0 auto 1rem; position: relative; z-index: 1;
    }
    .profile-hero h2 { font-size: 1.6rem; position: relative; z-index: 1; }
    .profile-hero p { opacity: .85; position: relative; z-index: 1; }

    .achievement-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 1rem; }
    .achievement-card {
      background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
      padding: 1.25rem; text-align: center; transition: all var(--transition);
    }
    .achievement-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .achievement-icon { font-size: 2rem; margin-bottom: .5rem; }
    .achievement-name { font-weight: 700; font-size: .85rem; }
    .achievement-desc { font-size: .75rem; color: var(--text-muted); margin-top: .2rem; }
    .achievement-card.locked { opacity: .4; filter: grayscale(1); }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">⚡ QuizSphere</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="categories.html"><span class="nav-icon">📚</span> My Quizzes</a>
        <a href="leaderboard.html"><span class="nav-icon">🏆</span> Leaderboard</a>
        <a href="results.html"><span class="nav-icon">📊</span> My Results</a>
        <a href="profile.html" class="active"><span class="nav-icon">👤</span> Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-btn" onclick="toggleTheme()" style="margin-bottom:.75rem">🌙 Toggle Theme</button>
        <a href="login.html" class="btn btn-secondary btn-sm btn-full" onclick="clearAuth()">🚪 Logout</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">👤 My Profile</h1>
        <p class="page-subtitle">Manage your account and view achievements</p>
      </div>

      <div class="profile-hero">
        <div class="profile-avatar">👤</div>
        <h2 id="profileName">Loading...</h2>
        <p id="profileEmail">—</p>
        <div style="display:flex;gap:2rem;justify-content:center;margin-top:1.5rem;position:relative;z-index:1">
          <div><div style="font-size:1.5rem;font-weight:800" id="ph-quizzes">—</div><div style="font-size:.8rem;opacity:.8">Quizzes</div></div>
          <div><div style="font-size:1.5rem;font-weight:800" id="ph-avg">—</div><div style="font-size:.8rem;opacity:.8">Avg Score</div></div>
          <div><div style="font-size:1.5rem;font-weight:800" id="ph-best">—</div><div style="font-size:.8rem;opacity:.8">Best</div></div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem" id="profileGrid">
        <!-- Edit Profile -->
        <div class="chart-container">
          <div style="font-weight:700;margin-bottom:1.25rem">✏️ Edit Profile</div>
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-control" id="editName" placeholder="Your full name" />
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input class="form-control" id="editEmail" type="email" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label class="form-label">College / Institution</label>
            <input class="form-control" id="editCollege" placeholder="Your college name" />
          </div>
          <div class="form-group">
            <label class="form-label">Department</label>
            <input class="form-control" id="editDept" placeholder="e.g. Computer Science" />
          </div>
          <button class="btn btn-primary btn-full" onclick="saveProfile()">Save Changes</button>
        </div>

        <!-- Performance -->
        <div class="chart-container">
          <div style="font-weight:700;margin-bottom:1.25rem">📊 Performance Overview</div>
          <div id="performanceContent" style="color:var(--text-muted);text-align:center;padding:2rem">
            <div class="spinner spinner-dark" style="margin:0 auto 1rem"></div>
            Loading stats...
          </div>
        </div>
      </div>

      <!-- Achievements -->
      <div class="chart-container">
        <div style="font-weight:700;margin-bottom:1.25rem">🏅 Achievements</div>
        <div class="achievement-grid" id="achievementGrid"></div>
      </div>
    </main>
  </div>

  <script src="api.js"></script>
  <script>
    requireAuth();
    const user = getUser();

    // Fill user info
    if (user) {
      document.getElementById('profileName').textContent = user.name || 'Student';
      document.getElementById('profileEmail').textContent = user.email || '—';
      document.getElementById('editName').value = user.name || '';
      document.getElementById('editEmail').value = user.email || '';
    }

    // Saved college/dept
    document.getElementById('editCollege').value = localStorage.getItem('qs_college') || '';
    document.getElementById('editDept').value = localStorage.getItem('qs_dept') || '';

    function saveProfile() {
      const name = document.getElementById('editName').value.trim();
      const college = document.getElementById('editCollege').value.trim();
      const dept = document.getElementById('editDept').value.trim();
      localStorage.setItem('qs_college', college);
      localStorage.setItem('qs_dept', dept);
      const u = getUser() || {};
      u.name = name;
      localStorage.setItem('qs_user', JSON.stringify(u));
      document.getElementById('profileName').textContent = name;
      showToast('Profile updated successfully!', 'success');
    }

    // Achievements
    const achievements = [
      { icon: '🚀', name: 'First Quiz', desc: 'Take your first quiz', key: 'first' },
      { icon: '🔥', name: 'Hot Streak', desc: '3 quizzes in a row', key: 'streak' },
      { icon: '💯', name: 'Perfect Score', desc: 'Score 100%', key: 'perfect' },
      { icon: '⚡', name: 'Speed Master', desc: 'Finish in under 5 min', key: 'speed' },
      { icon: '🏆', name: 'Top 10', desc: 'Enter leaderboard top 10', key: 'top10' },
      { icon: '🎓', name: 'Scholar', desc: 'Complete 10 quizzes', key: 'scholar' },
      { icon: '🧠', name: 'Brain Trust', desc: 'Avg score above 80%', key: 'brain' },
      { icon: '🌟', name: 'Superstar', desc: 'Score 90%+ three times', key: 'super' },
    ];

    async function loadProfile() {
      try {
        const results = await apiFetch(API.results.user(user?.id || 1));
        const total = results?.length || 0;
        const percentages = (results || []).map(r => (r.score / r.totalQuestions) * 100);
        const avg = total ? percentages.reduce((a, b) => a + b, 0) / total : 0;
        const best = total ? Math.max(...percentages) : 0;

        document.getElementById('ph-quizzes').textContent = total;
        document.getElementById('ph-avg').textContent = avg.toFixed(1) + '%';
        document.getElementById('ph-best').textContent = best.toFixed(1) + '%';

        document.getElementById('performanceContent').innerHTML = `
          <div style="display:flex;flex-direction:column;gap:1rem">
            <div>
              <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.35rem">
                <span>Average Score</span><strong>${avg.toFixed(1)}%</strong>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${avg}%"></div></div>
            </div>
            <div>
              <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.35rem">
                <span>Best Score</span><strong>${best.toFixed(1)}%</strong>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${best}%;background:var(--green)"></div></div>
            </div>
            <div>
              <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.35rem">
                <span>Pass Rate (≥60%)</span>
                <strong>${total ? ((percentages.filter(p => p >= 60).length / total * 100).toFixed(0)) : 0}%</strong>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width:${total ? (percentages.filter(p => p >= 60).length / total * 100) : 0}%;background:var(--purple)"></div>
              </div>
            </div>
            <div style="margin-top:.5rem;color:var(--text-muted);font-size:.85rem;text-align:center">
              Completed <strong>${total}</strong> quiz${total !== 1 ? 'zes' : ''}
            </div>
          </div>`;

        // Achievements
        const unlocked = {
          first: total >= 1,
          streak: total >= 3,
          perfect: percentages.some(p => p === 100),
          speed: false, // Would need time data
          top10: false, // Would need leaderboard check
          scholar: total >= 10,
          brain: avg >= 80,
          super: percentages.filter(p => p >= 90).length >= 3,
        };

        document.getElementById('achievementGrid').innerHTML = achievements.map(a => `
          <div class="achievement-card ${unlocked[a.key] ? '' : 'locked'}">
            <div class="achievement-icon">${a.icon}</div>
            <div class="achievement-name">${a.name}</div>
            <div class="achievement-desc">${a.desc}</div>
            ${unlocked[a.key] ? '<div style="color:var(--green);font-size:.75rem;margin-top:.4rem;font-weight:700">✅ Unlocked</div>' : ''}
          </div>
        `).join('');

      } catch {
        document.getElementById('performanceContent').innerHTML = `<div style="color:var(--text-muted)">Could not load stats.</div>`;
        document.getElementById('achievementGrid').innerHTML = achievements.map(a => `
          <div class="achievement-card locked">
            <div class="achievement-icon">${a.icon}</div>
            <div class="achievement-name">${a.name}</div>
            <div class="achievement-desc">${a.desc}</div>
          </div>
        `).join('');
      }
    }

    // Responsive grid
    if (window.innerWidth < 768) {
      document.getElementById('profileGrid').style.gridTemplateColumns = '1fr';
    }

    loadProfile();
  </script>
</body>
</html>
